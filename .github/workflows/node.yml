name: "Nodejs App CICD pipeline"

on: 
    push: 
      branches: [ "main" ]
    pull_request:
      branches: [ "main" ]

      paths-ignore:
             -  'README.md'


jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: action/checkout@v4
             
      - uses: action/setup-node@v4
        with: 
          node-version: 22
            
      - name: Install dependencies
        run: npm install

      - name: Test app
        run: npm test

      - name: Build
        run: echo " building application " npm

      - name: Run ESLint
        run: echo " ESLint succesful " 

      - name: Build Docker Image 
        run: docker build . --file Dockerfile --tag CI-CD-PROJECT:$(date +%s) 

      - name: login to DockerHub
      env:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }} 
      run: echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME"
       
      - name: push Docker image
        run: |
          docker tag CI-CD-PROJECT: latest  ${{ secrets.DOCKERHUB_USERNAME }}/Doc-Njila/CI-CD-PROJECT:latest
          docker push ${{ secrets.DOCKERHUB_TOKEN }}/Doc-Njila/CI-CD-PROJECT:latest

      # full deployment
            

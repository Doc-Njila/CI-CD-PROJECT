name: "Nodejs App CICD pipeline"

on: 
    push: 
      branches: [ "main" ]
    pull_request:
      branches: [ "main" ]

      paths-ignore:
             -  'README.md'


jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: action/checkout@v4
             
      - uses: action/setup-node@v4
        with: 
          node-version: 22
            
      - name: Install dependencies
        run: npm install

      - name: Test app
        run: npm test

      - name: Build
        run: echo " building application " npm

      - name: Run ESLint
        run: echo " ESLint succesful " 

    
      - name: Build and Push Docker Image
        uses: mr-smithers-excellent/docker-build-push@v4
        with:
          image: docnjila/sample-nodes
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }} 
      
# full deployment
            
